name: Deploy (Frontend + Backend)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.14'
  RENDER_BACKEND_ID: srv-d96l2b6q1p3s73cujt00

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: cd frontend && bun install
      - name: Build frontend
        run: cd frontend && bun run build
      - name: Deploy to Vercel
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        working-directory: ./frontend
        run: |
          npx vercel@latest deploy --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --scope ${{ secrets.VERCEL_ORG_ID }}

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    env:
      HAS_RENDER_API_KEY: ${{ secrets.RENDER_API_KEY != '' && 'true' || 'false' }}
    steps:
      - name: Trigger Render Deploy
        if: ${{ env.HAS_RENDER_API_KEY == 'true' }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ env.RENDER_BACKEND_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
